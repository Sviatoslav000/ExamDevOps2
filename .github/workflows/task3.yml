name: "App Deployment to Minikube"

on:
  workflow_run:
    workflows: ["Ansible Software Deployment"]
    types:
      - completed
  workflow_dispatch:

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ref: 'develop'
            tag: 'develop'
          - ref: '1.0.0'
            tag: '1.0.0'
    steps:
      - name: Checkout App Repository
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: ${{ matrix.ref }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:${{ matrix.tag }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - env: 'dev'
            tag: 'develop'
            port: '8002'
          - env: 'release'
            tag: '1.0.0'
            port: '8003'
    steps:
      - name: Checkout Infrastructure
        uses: actions/checkout@v4

      - name: Get VM IP from Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-ip
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Fallback to Manual IP (if artifact fails)
        if: env.VM_IP == ''
        run: |
          if [ ! -f vm_ip.txt ]; then
            echo "34.61.192.94" > vm_ip.txt
          fi
          echo "VM_IP=$(cat vm_ip.txt)" >> $GITHUB_ENV

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Kubernetes Dry Run Check
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.VM_IP }} \
          "sudo -u yablonskyi_devops kubectl run app-${{ matrix.env }} --image=${{ secrets.DOCKERHUB_USERNAME }}/exam-app:${{ matrix.tag }} --port=8000 --dry-run=client"

      - name: Deploy to Minikube
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.VM_IP }} << EOF
            sudo -u yablonskyi_devops kubectl create namespace ${{ matrix.env }} --dry-run=client -o yaml | sudo -u yablonskyi_devops kubectl apply -f -

            sudo -u yablonskyi_devops kubectl delete pod app-${{ matrix.env }} --namespace=${{ matrix.env }} --ignore-not-found=true

            sudo -u yablonskyi_devops kubectl run app-${{ matrix.env }} \
              --image=${{ secrets.DOCKERHUB_USERNAME }}/exam-app:${{ matrix.tag }} \
              --port=8000 \
              --namespace=${{ matrix.env }} \
              --restart=Never \
              --dry-run=client -o yaml | sudo -u yablonskyi_devops kubectl apply -f -

            sudo -u yablonskyi_devops kubectl delete svc app-svc-${{ matrix.env }} --namespace=${{ matrix.env }} --ignore-not-found=true

            sudo -u yablonskyi_devops kubectl expose pod app-${{ matrix.env }} \
              --type=NodePort \
              --port=80 \
              --target-port=8000 \
              --name=app-svc-${{ matrix.env }} \
              --namespace=${{ matrix.env }}

            sudo -u yablonskyi_devops kubectl delete pod pf-${{ matrix.env }} --namespace=${{ matrix.env }} --ignore-not-found=true

            sudo -u yablonskyi_devops kubectl run pf-${{ matrix.env }} \
              --image=alpine/socat \
              --namespace=${{ matrix.env }} \
              --restart=Never \
              --command -- sh -c "apk add --no-cache socat && socat TCP-LISTEN:${{ matrix.port }},fork,reuseaddr TCP:app-svc-${{ matrix.env }}:80"
          EOF
