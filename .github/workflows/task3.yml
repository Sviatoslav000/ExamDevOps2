name: "Task 3: App Build & Deploy"

on:
  workflow_dispatch:
    inputs:
      vm_ip:
        description: 'Введіть IP-адресу ВМ (savitskyi-node)'
        required: true

jobs:
  # ДЖОБА 1: Збірка та відправка образів
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- Збірка середовища DEV (гілка develop) ---
      - name: Checkout external app (develop branch)
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: 'develop'

      - name: Build and push Dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:develop

      # --- Збірка середовища RELEASE (тег 1.0.0) ---
      - name: Checkout external app (tag 1.0.0)
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: '1.0.0'

      - name: Build and push Release image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:1.0.0

  # ДЖОБА 2: Розгортання у K8s та прокидання портів
  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout YOUR code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ github.event.inputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Copy manifest to temporary location
        run: |
          # Копіюємо у /tmp, щоб потім перемістити з потрібними правами
          scp -i ~/.ssh/id_rsa task3/app-manifest.yaml ubuntu@${{ github.event.inputs.vm_ip }}:/tmp/app-manifest.yaml

      - name: Deploy and Port-Forward as yablonskyi_devops
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ github.event.inputs.vm_ip }} << 'EOF'
            TARGET_DIR="/home/yablonskyi_devops"

            # Підготовка маніфесту в папку користувача
            sudo mv /tmp/app-manifest.yaml $TARGET_DIR/app-manifest.yaml
            sudo chown yablonskyi_devops:yablonskyi_devops $TARGET_DIR/app-manifest.yaml

            # Очищення старих портів (виконуємо від імені devops-юзера)
            sudo -u yablonskyi_devops pkill -f "port-forward.*8002" || true
            sudo -u yablonskyi_devops pkill -f "port-forward.*8003" || true

            # --- DEV Environment ---
            sudo -u yablonskyi_devops sh -c "sed -e 's|\${ENV_NAME}|dev|g' \
                -e 's|\${IMAGE_TAG}|develop|g' \
                -e 's|\${DOCKER_USER}|${{ secrets.DOCKERHUB_USERNAME }}|g' \
                $TARGET_DIR/app-manifest.yaml > $TARGET_DIR/dev-deploy.yaml"

            sudo -u yablonskyi_devops kubectl apply -f $TARGET_DIR/dev-deploy.yaml

            # --- RELEASE Environment ---
            sudo -u yablonskyi_devops sh -c "sed -e 's|\${ENV_NAME}|release|g' \
                -e 's|\${IMAGE_TAG}|1.0.0|g' \
                -e 's|\${DOCKER_USER}|${{ secrets.DOCKERHUB_USERNAME }}|g' \
                $TARGET_DIR/app-manifest.yaml > $TARGET_DIR/release-deploy.yaml"

            sudo -u yablonskyi_devops kubectl apply -f $TARGET_DIR/release-deploy.yaml

            # Очікування підняття подів
            sleep 20

            # Запуск port-forward у фоні
            sudo -u yablonskyi_devops nohup kubectl port-forward svc/devops-app-svc 8002:8000 -n dev --address 0.0.0.0 > /dev/null 2>&1 &
            sudo -u yablonskyi_devops nohup kubectl port-forward svc/devops-app-svc 8003:8000 -n release --address 0.0.0.0 > /dev/null 2>&1 &

            echo "Успішно розгорнуто від імені yablonskyi_devops!"
          EOF
