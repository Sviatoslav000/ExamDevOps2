name: "App Deployment to Minikube"

on:
  # Автоматичний запуск після завершення конвеєра Ansible
  workflow_run:
    workflows: ["Ansible Software Deployment"] # Переконайся, що назва збігається з name у ansible.yml
    types:
      - completed
  # Залишаємо можливість ручного запуску для тестів
  workflow_dispatch:

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # ВИМОГА: Збірка з гілки develop та тегу 1.0.0 одночасно
        include:
          - ref: 'develop'
            tag: 'develop'
          - ref: '1.0.0'
            tag: '1.0.0'
    steps:
      - name: Checkout App Repository
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: ${{ matrix.ref }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:${{ matrix.tag }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - env: 'dev'
            tag: 'develop'
            port: '8002'
          - env: 'release'
            tag: '1.0.0'
            port: '8003'
    steps:
      - name: Checkout Infrastructure
        uses: actions/checkout@v4

      - name: Get VM IP from Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-ip
          # Беремо артефакт з останнього успішного запуску Terraform
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Fallback to Manual IP (if artifact fails)
        if: env.VM_IP == ''
        run: |
          if [ ! -f vm_ip.txt ]; then
            echo "34.61.192.94" > vm_ip.txt
          fi
          echo "VM_IP=$(cat vm_ip.txt)" >> $GITHUB_ENV

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # ВИМОГА: Перевірка Dry Run
      - name: Kubernetes Dry Run Check
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.VM_IP }} \
          "sudo -u yablonskyi_devops kubectl run app-${{ matrix.env }} --image=${{ secrets.DOCKERHUB_USERNAME }}/exam-app:${{ matrix.tag }} --dry-run=client"

    # РЕАЛЬНЕ РОЗГОРТАННЯ ЧЕРЕЗ SERVICE
      - name: Deploy to Minikube
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.VM_IP }} << EOF
            # 1. Створення Namespace
            sudo -u yablonskyi_devops kubectl create namespace ${{ matrix.env }} --dry-run=client -o yaml | sudo -u yablonskyi_devops kubectl apply -f -

            # 2. Запуск Поду (якщо не створено)
            sudo -u yablonskyi_devops kubectl run app-${{ matrix.env }} \
              --image=${{ secrets.DOCKERHUB_USERNAME }}/exam-app:${{ matrix.tag }} \
              --port=80 \
              --namespace=${{ matrix.env }} \
              --dry-run=client -o yaml | sudo -u yablonskyi_devops kubectl apply -f -

            # 3. ВИДАЛЯЄМО СТАРИЙ СЕРВІС (якщо є)
            sudo -u yablonskyi_devops kubectl delete svc app-svc-${{ matrix.env }} --namespace=${{ matrix.env }} --ignore-not-found=true

            # 4. СТВОРЮЄМО СЕРВІС ТИПУ NODEPORT
            # Це відкриє випадковий порт (30000-32767) на рівні кластера
            sudo -u yablonskyi_devops kubectl expose pod app-${{ matrix.env }} \
              --type=NodePort \
              --port=80 \
              --target-port=80 \
              --name=app-svc-${{ matrix.env }} \
              --namespace=${{ matrix.env }}

            # 5. МАГІЯ: ПРОКИДАННЯ ПОРТУ (SOCAT або PORT-FORWARD)
            # Оскільки нам потрібні саме 8002/8003, використаємо socat — він надійніший за kubectl для фону
            sudo apt-get install -y socat

            # Вбиваємо старі перенаправлення
            sudo fuser -k ${{ matrix.port }}/tcp || true

            # Отримуємо внутрішній IP поду
            POD_IP=\$(sudo -u yablonskyi_devops kubectl get pod app-${{ matrix.env }} --namespace=${{ matrix.env }} -o jsonpath='{.status.podIP}')

            # Запускаємо перенаправлення через socat (він набагато стабільніший)
            nohup sudo socat TCP-LISTEN:${{ matrix.port }},fork,reuseaddr TCP:\$POD_IP:8000 > /dev/null 2>&1 &
          EOF
